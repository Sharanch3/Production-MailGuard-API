stages:
  data-ingestion:
    cmd: python src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    params:
    - data-ingestion.test_size
    outs:
    - data/raw
  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
    - data/raw
    - src/data_preprocessing.py
    outs:
    - data/interim/test_processed.csv
    - data/interim/train_processed.csv
  feature-engineering:
    cmd: python src/feature_engineering.py
    deps:
    - data/interim/test_processed.csv
    - data/interim/train_processed.csv
    - src/feature_engineering.py
    params:
    - feature-engineering.max_features
    outs:
    - data/processed/test_tfidf.csv
    - data/processed/train_tfidf.csv
    - artifacts/vectorizer.joblib
  model_building:
    cmd: python src/model_building.py
    deps:
    - data/processed/test_tfidf.csv
    - data/processed/train_tfidf.csv
    - src/model_building.py
    params:
    - model-building.solver
    - model-building.penalty
    - model-building.random_state
    outs:
    - artifacts/model.joblib
  model-evaluation:
    cmd: python src/model_evaluation.py
    deps:
    - artifacts/model.joblib
    - src/model_evaluation.py
    outs:
    - reports/metrics.json

